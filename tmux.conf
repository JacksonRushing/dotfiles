# --- Basics ---
set -g mouse on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1

# --- Prefix: Ctrl-a is easier to reach than Ctrl-b ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config without restarting tmux ---
bind r source-file ~/.tmux.conf \; display "reloaded!"

# --- Splits that make visual sense ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Easier resizing (hold prefix, tap repeatedly) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Status bar ---
set -g status-style "bg=black,fg=white"
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=yellow]%H:%M #[fg=cyan]%d-%b"
set -g status-interval 5

# --- Activity in other windows ---
setw -g monitor-activity on
set -g visual-activity off

# --- Copy/paste to system clipboard ---
set -g set-clipboard on
setw -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear

# --- Better focus + disconnect behavior ---
set -g focus-events on